<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPEC Trainer Portal</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(-10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' }
                        },
                        zoomIn: {
                            '0%': { opacity: '0', transform: 'scale(0.95)' },
                            '100%': { opacity: '1', transform: 'scale(1)' }
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.4s ease-out forwards',
                        'zoom-in': 'zoomIn 0.3s ease-out forwards'
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX compilation in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { margin: 0; padding: 0; }
        
        /* Custom scrollbar to match the design */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.2);
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(99, 102, 241, 0.4);
        }
    </style>
</head>
<body class="bg-[#0a0a12] text-slate-300 antialiased selection:bg-indigo-500/30">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Inline SVG Icons (Replaces lucide-react CDN to fix UMD errors) ---
        const IconWrapper = ({ children, size = 24, className = '', strokeWidth = 2, ...props }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
            {children}
          </svg>
        );

        const Plus = (props) => <IconWrapper {...props}><path d="M5 12h14"/><path d="M12 5v14"/></IconWrapper>;
        const Play = (props) => <IconWrapper {...props}><polygon points="6 3 20 12 6 21 6 3"/></IconWrapper>;
        const Heart = (props) => <IconWrapper {...props}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></IconWrapper>;
        const ArrowRight = (props) => <IconWrapper {...props}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></IconWrapper>;
        const Sparkles = (props) => <IconWrapper {...props}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></IconWrapper>;
        const X = (props) => <IconWrapper {...props}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></IconWrapper>;
        const BookOpen = (props) => <IconWrapper {...props}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></IconWrapper>;
        const Activity = (props) => <IconWrapper {...props}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></IconWrapper>;
        const Flame = (props) => <IconWrapper {...props}><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></IconWrapper>;
        const Calendar = (props) => <IconWrapper {...props}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></IconWrapper>;
        const Moon = (props) => <IconWrapper {...props}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></IconWrapper>;
        const InfinityIcon = (props) => <IconWrapper {...props}><path d="M12 12c-2-2.67-4-4-6-4a4 4 0 1 0 0 8c2 0 4-1.33 6-4Zm0 0c2 2.67 4 4 6 4a4 4 0 0 0 0-8c-2 0-4 1.33-6 4Z"/></IconWrapper>;
        const Eye = (props) => <IconWrapper {...props}><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></IconWrapper>;
        const Feather = (props) => <IconWrapper {...props}><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"/><line x1="16" y1="8" x2="2" y2="22"/><line x1="17.5" y1="15" x2="9" y2="6.5"/></IconWrapper>;
        const Info = (props) => <IconWrapper {...props}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></IconWrapper>;
        const ChevronDown = (props) => <IconWrapper {...props}><path d="m6 9 6 6 6-6"/></IconWrapper>;
        const ChevronUp = (props) => <IconWrapper {...props}><path d="m18 15-6-6-6 6"/></IconWrapper>;

        function App() {
          // --- State with LocalStorage Persistence ---
          const [goals, setGoals] = useState(() => {
            const saved = localStorage.getItem('spec-metaphysical-goals');
            return saved ? JSON.parse(saved) : [];
          });
          
          const [isAdding, setIsAdding] = useState(false);
          const [newGoalText, setNewGoalText] = useState('');
          const [newGoalWhy, setNewGoalWhy] = useState('');
          const [activeGoalId, setActiveGoalId] = useState(null);

          useEffect(() => {
            localStorage.setItem('spec-metaphysical-goals', JSON.stringify(goals));
          }, [goals]);

          const activeGoal = goals.find(g => g.id === activeGoalId);

          // --- Handlers ---
          const handleAddGoal = (e) => {
            e.preventDefault();
            if (!newGoalText.trim()) return;
            
            const newGoal = {
              id: Date.now(),
              text: newGoalText,
              why: newGoalWhy,
              status: 'active',
              createdAt: new Date().toISOString(),
              projectSessions: [],
              expectLogs: [],
              collectionLog: null
            };
            
            setGoals([newGoal, ...goals]);
            setNewGoalText('');
            setNewGoalWhy('');
            setIsAdding(false);
          };

          const updateGoal = (goalId, updates) => {
            setGoals(goals.map(goal => 
              goal.id === goalId ? { ...goal, ...updates } : goal
            ));
          };

          const deleteGoal = (goalId) => {
            if(window.confirm('Möchtest du diese Intention wirklich aus dem Feld löschen?')) {
              setGoals(goals.filter(g => g.id !== goalId));
              setActiveGoalId(null);
            }
          };

          // --- Renderers ---
          return (
            <div className="min-h-screen pb-12 relative overflow-hidden">
              
              {/* Cosmic Background Elements */}
              <div className="fixed top-0 left-1/4 w-[500px] h-[500px] bg-indigo-900/20 rounded-full blur-[120px] pointer-events-none"></div>
              <div className="fixed bottom-0 right-1/4 w-[600px] h-[600px] bg-purple-900/10 rounded-full blur-[150px] pointer-events-none"></div>

              {/* Header */}
              <header className="border-b border-white/5 sticky top-0 z-10 backdrop-blur-md bg-[#0a0a12]/80">
                <div className="max-w-3xl mx-auto px-4 py-5 flex justify-between items-center relative z-10">
                  <div className="flex items-center gap-3">
                    <InfinityIcon className="text-indigo-400" size={28} strokeWidth={1.5} />
                    <h1 className="text-xl font-light tracking-widest text-white">
                      S P E C <span className="text-indigo-400 font-semibold">PORTAL</span>
                    </h1>
                  </div>
                  <button 
                    onClick={() => setIsAdding(true)}
                    className="flex items-center gap-2 bg-white/5 hover:bg-white/10 border border-white/10 text-white px-5 py-2 rounded-full font-light transition-all text-sm backdrop-blur-sm"
                  >
                    <Plus size={16} />
                    <span className="hidden sm:inline">Neue Realität</span>
                  </button>
                </div>
              </header>

              <main className="max-w-3xl mx-auto px-4 py-8 relative z-10">
                
                {/* Intro / Empty State */}
                {goals.length === 0 && !isAdding && (
                  <div className="text-center py-20 px-4 bg-white/[0.02] border border-white/5 rounded-3xl backdrop-blur-sm mt-4">
                    <div className="w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-8 relative">
                      <div className="absolute inset-0 bg-indigo-500/20 rounded-full blur-xl animate-pulse"></div>
                      <Moon className="text-indigo-300 relative z-10" size={40} strokeWidth={1} />
                    </div>
                    <h2 className="text-3xl font-light text-white mb-4 tracking-wide">Frequenz zieht Realität an.</h2>
                    <p className="text-slate-400 mb-10 max-w-md mx-auto leading-relaxed font-light">
                      Das Universum reagiert nicht auf Wünsche, es reagiert auf Resonanz. Wähle deine neue Realität, richte deine Schwingung aus, lasse die Kontrolle los und empfange.
                    </p>
                    <button 
                      onClick={() => setIsAdding(true)}
                      className="bg-indigo-600/80 hover:bg-indigo-500 text-white px-8 py-3.5 rounded-full font-medium transition-all shadow-[0_0_30px_-5px_rgba(79,70,229,0.4)]"
                    >
                      Initiiere Schritt 1: Select
                    </button>
                  </div>
                )}

                {/* Add Goal Form (Select) */}
                {isAdding && (
                  <div className="bg-[#11111a] p-6 sm:p-8 rounded-3xl border border-indigo-500/20 shadow-2xl mb-8 animate-fade-in relative overflow-hidden">
                    <div className="absolute top-0 right-0 w-32 h-32 bg-indigo-500/10 rounded-full blur-3xl"></div>
                    
                    <div className="flex justify-between items-center mb-8 relative z-10">
                      <h2 className="text-xl font-light flex items-center gap-3 text-white">
                        <span className="bg-indigo-500/20 text-indigo-300 w-8 h-8 rounded-full flex items-center justify-center text-sm font-medium border border-indigo-500/30">1</span>
                        Select: Die Absicht setzen
                      </h2>
                      <button onClick={() => setIsAdding(false)} className="text-slate-500 hover:text-white transition-colors">
                        <X size={24} strokeWidth={1.5} />
                      </button>
                    </div>
                    
                    <GuideCard type="select" />
                    
                    <form onSubmit={handleAddGoal} className="flex flex-col gap-6 relative z-10 mt-6">
                      <div>
                        <label className="block text-sm font-medium text-indigo-200 mb-2">Welche neue Realität wählst du? (Klar & Präsent)</label>
                        <input
                          type="text"
                          autoFocus
                          placeholder="z.B. Ich lebe in vollkommener finanzieller Fülle und Freiheit..."
                          className="w-full px-4 py-4 bg-black/40 border border-white/10 rounded-xl focus:ring-1 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all text-lg text-white font-light placeholder:text-slate-600"
                          value={newGoalText}
                          onChange={(e) => setNewGoalText(e.target.value)}
                        />
                      </div>
                      
                      <div>
                        <label className="block text-sm font-medium text-indigo-200 mb-2">Was ist die emotionale Signatur? (Frequenz / Das Warum)</label>
                        <textarea
                          rows="2"
                          placeholder="z.B. Ich fühle tiefe Dankbarkeit, Leichtigkeit und inneren Frieden..."
                          className="w-full px-4 py-4 bg-black/40 border border-white/10 rounded-xl focus:ring-1 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all resize-none text-white font-light placeholder:text-slate-600"
                          value={newGoalWhy}
                          onChange={(e) => setNewGoalWhy(e.target.value)}
                        />
                      </div>

                      <div className="flex justify-end gap-4 mt-4">
                        <button 
                          type="button" 
                          onClick={() => setIsAdding(false)}
                          className="px-6 py-3 text-slate-400 hover:text-white rounded-xl font-medium transition-colors"
                        >
                          Abbrechen
                        </button>
                        <button 
                          type="submit"
                          disabled={!newGoalText.trim()}
                          className="px-8 py-3 bg-indigo-600/80 hover:bg-indigo-500 disabled:bg-indigo-900/50 disabled:text-slate-500 text-white rounded-xl font-medium transition-all shadow-[0_0_20px_-5px_rgba(79,70,229,0.4)] disabled:shadow-none"
                        >
                          Ins Feld eingeben
                        </button>
                      </div>
                    </form>
                  </div>
                )}

                {/* Goals List */}
                <div className="space-y-5 relative z-10">
                  {goals.map(goal => (
                    <GoalCard 
                      key={goal.id} 
                      goal={goal} 
                      onClick={() => setActiveGoalId(goal.id)} 
                    />
                  ))}
                </div>
              </main>

              {/* Metaphysical Goal Dashboard Modal */}
              {activeGoal && (
                <GoalDashboard 
                  goal={activeGoal} 
                  onClose={() => setActiveGoalId(null)} 
                  updateGoal={(updates) => updateGoal(activeGoal.id, updates)}
                  onDelete={() => deleteGoal(activeGoal.id)}
                />
              )}
            </div>
          );
        }

        // --- Subcomponents ---

        function GoalCard({ goal, onClick }) {
          const isCompleted = goal.status === 'completed';
          const sessionsCount = goal.projectSessions?.length || 0;
          const journalCount = goal.expectLogs?.length || 0;

          return (
            <button 
              onClick={onClick}
              className={`w-full text-left p-6 rounded-2xl border backdrop-blur-sm transition-all duration-300 group ${
                isCompleted 
                  ? 'bg-emerald-900/10 border-emerald-500/20 hover:border-emerald-500/40' 
                  : 'bg-white/[0.02] border-white/5 hover:border-indigo-500/30 hover:bg-indigo-900/10'
              }`}
            >
              <div className="flex items-start justify-between gap-4">
                <div className="flex-1 pr-4">
                  <div className="flex items-center gap-4 mb-4">
                    <span className={`text-[10px] font-medium uppercase tracking-[0.2em] px-3 py-1 rounded-full flex items-center gap-1.5 border ${
                      isCompleted 
                        ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' 
                        : 'bg-indigo-500/10 text-indigo-300 border-indigo-500/20'
                    }`}>
                      {isCompleted ? <Heart size={10} /> : <Activity size={10} />}
                      {isCompleted ? 'Manifestiert' : 'Im Feld'}
                    </span>
                    <span className="text-xs text-slate-500 flex items-center gap-1.5 font-light">
                      <Calendar size={12} /> 
                      Intention vom {new Date(goal.createdAt).toLocaleDateString()}
                    </span>
                  </div>
                  
                  <h3 className={`text-xl font-light tracking-wide mb-3 ${isCompleted ? 'text-slate-500' : 'text-white'}`}>
                    {goal.text}
                  </h3>
                  
                  {!isCompleted && goal.why && (
                    <p className="text-sm text-slate-400 line-clamp-1 italic font-light border-l border-indigo-500/30 pl-3">
                      "{goal.why}"
                    </p>
                  )}
                </div>
                
                <div className="flex-shrink-0 text-slate-600 group-hover:text-indigo-400 transition-colors mt-2">
                  <ArrowRight size={24} strokeWidth={1} className="group-hover:translate-x-2 transition-transform duration-300" />
                </div>
              </div>

              {!isCompleted && (
                <div className="mt-6 flex gap-6 border-t border-white/5 pt-4">
                  <div className="flex items-center gap-2 text-xs text-slate-400 font-light">
                    <Eye size={14} className="text-indigo-400" />
                    <span className="text-white">{sessionsCount}</span> Projektionen
                  </div>
                  <div className="flex items-center gap-2 text-xs text-slate-400 font-light">
                    <Feather size={14} className="text-purple-400" />
                    <span className="text-white">{journalCount}</span> Integrationen
                  </div>
                </div>
              )}
            </button>
          );
        }

        function GoalDashboard({ goal, onClose, updateGoal, onDelete }) {
          const [activeTab, setActiveTab] = useState(goal.status === 'completed' ? 'collect' : 'project');
          
          const TABS = [
            { id: 'project', label: 'Project', sub: 'Frequenz', icon: Eye, color: 'text-indigo-400', border: 'border-indigo-500' },
            { id: 'expect', label: 'Expect', sub: 'Resonanz', icon: Feather, color: 'text-purple-400', border: 'border-purple-500' },
            { id: 'collect', label: 'Collect', sub: 'Materie', icon: Heart, color: 'text-emerald-400', border: 'border-emerald-500' }
          ];

          const isCompleted = goal.status === 'completed';

          return (
            <div className="fixed inset-0 bg-[#050508]/80 backdrop-blur-xl flex items-center justify-center p-2 sm:p-4 z-50">
              <div className="bg-[#0f0f16] border border-white/10 rounded-3xl w-full max-w-2xl max-h-[90vh] flex flex-col shadow-2xl relative overflow-hidden animate-zoom-in">
                
                {/* Header */}
                <div className="p-6 sm:p-8 pb-0 flex-shrink-0 relative z-10">
                  <div className="flex justify-between items-start mb-6">
                    <div className="pr-8">
                      <p className="text-[10px] font-medium text-indigo-400 uppercase tracking-[0.2em] mb-2">Gewählte Realität</p>
                      <h2 className="text-2xl font-light text-white leading-tight">{goal.text}</h2>
                    </div>
                    <button onClick={onClose} className="text-slate-500 hover:text-white bg-white/5 hover:bg-white/10 p-2.5 rounded-full transition-all">
                      <X size={20} strokeWidth={1.5} />
                    </button>
                  </div>
                  
                  {goal.why && (
                    <div className="bg-white/[0.02] border border-white/5 rounded-xl p-5 mb-6">
                      <p className="text-[10px] uppercase tracking-widest text-slate-500 mb-2">Emotionale Signatur</p>
                      <p className="text-slate-300 font-light italic leading-relaxed">"{goal.why}"</p>
                    </div>
                  )}

                  {/* Navigation Tabs */}
                  <div className="flex gap-1 sm:gap-4 border-b border-white/10">
                    {TABS.map(tab => (
                      <button
                        key={tab.id}
                        onClick={() => setActiveTab(tab.id)}
                        className={`pb-4 px-4 flex flex-col items-center gap-1.5 transition-all relative ${
                          activeTab === tab.id 
                            ? `${tab.color}` 
                            : 'text-slate-500 hover:text-slate-300'
                        }`}
                      >
                        <div className="flex items-center gap-2 text-sm font-medium tracking-wide">
                          <tab.icon size={16} strokeWidth={1.5} />
                          <span>{tab.label}</span>
                        </div>
                        <span className="text-[10px] uppercase tracking-wider opacity-70">{tab.sub}</span>
                        {activeTab === tab.id && (
                          <div className={`absolute bottom-0 left-0 w-full h-[2px] bg-current rounded-t-full shadow-[0_0_10px_currentColor]`} />
                        )}
                      </button>
                    ))}
                  </div>
                </div>

                {/* Content Body */}
                <div className="p-6 sm:p-8 overflow-y-auto flex-1 relative z-10 custom-scrollbar">
                  {activeTab === 'project' && <ProjectTab goal={goal} updateGoal={updateGoal} isCompleted={isCompleted} />}
                  {activeTab === 'expect' && <ExpectTab goal={goal} updateGoal={updateGoal} isCompleted={isCompleted} />}
                  {activeTab === 'collect' && <CollectTab goal={goal} updateGoal={updateGoal} isCompleted={isCompleted} />}
                </div>
                
                {/* Footer actions */}
                <div className="px-6 py-4 bg-black/20 border-t border-white/5 flex justify-between items-center flex-shrink-0 z-10">
                  <span className="text-[10px] uppercase tracking-widest text-slate-600">Eingespeist: {new Date(goal.createdAt).toLocaleDateString()}</span>
                  <button 
                    onClick={onDelete}
                    className="text-xs text-red-500/70 hover:text-red-400 hover:bg-red-500/10 px-3 py-1.5 rounded-lg transition-colors font-medium tracking-wide"
                  >
                    Feld bereinigen
                  </button>
                </div>
              </div>
            </div>
          );
        }

        function ProjectTab({ goal, updateGoal, isCompleted }) {
          const [timeLeft, setTimeLeft] = useState(60);
          const [isActive, setIsActive] = useState(false);

          useEffect(() => {
            let interval = null;
            if (isActive && timeLeft > 0) {
              interval = setInterval(() => {
                setTimeLeft(time => time - 1);
              }, 1000);
            } else if (timeLeft === 0 && isActive) {
              setIsActive(false);
              const newSession = new Date().toISOString();
              updateGoal({ projectSessions: [...(goal.projectSessions || []), newSession] });
              setTimeLeft(60); 
            }
            return () => clearInterval(interval);
          }, [isActive, timeLeft, goal, updateGoal]);

          const sessions = goal.projectSessions?.length || 0;

          const getMeditationText = () => {
            if (!isActive) return "Klicke auf Start, um dich mit der Frequenz deines Ziels zu verbinden.";
            if (timeLeft > 50) return "Atme tief ein. Verbinde dich mit dem Nullpunktfeld. Alles existiert bereits im Jetzt.";
            if (timeLeft > 35) return "Sieh deine neue Realität klar vor deinem inneren Auge. Beobachte die Details.";
            if (timeLeft > 20) return "Tauche in die Emotion ein. Wie fühlt es sich an? Verankere dieses Gefühl in deinem Körper.";
            if (timeLeft > 5) return "Dehne diese emotionale Frequenz aus. Lass sie weit über deinen physischen Körper hinausstrahlen.";
            return "Lass das Bild nun komplett los. Übergib es dem Universum.";
          };

          return (
            <div className="max-w-md mx-auto py-4 text-center">
              <GuideCard type="project" />
              
              <div className="mb-10 mt-6">
                <div className="inline-flex items-center gap-2 bg-indigo-500/10 text-indigo-300 border border-indigo-500/20 px-4 py-1.5 rounded-full text-xs font-medium uppercase tracking-wider mb-6">
                  <Flame size={14} className={sessions > 0 ? "text-indigo-400" : "text-slate-500"} />
                  {sessions} Projektionen
                </div>
                <p className="text-slate-400 font-light leading-relaxed h-16 transition-opacity duration-500">
                  {getMeditationText()}
                </p>
              </div>
              
              {!isCompleted ? (
                <>
                  <div className="relative w-48 h-48 mx-auto mb-12 flex items-center justify-center">
                    <div className={`absolute inset-0 bg-indigo-500/20 rounded-full blur-2xl transition-all duration-1000 ${isActive ? 'animate-pulse scale-150 opacity-100' : 'scale-100 opacity-0'}`}></div>
                    
                    <div className={`absolute inset-0 border-[1px] border-indigo-500/50 rounded-full transition-all duration-[4000ms] ease-in-out ${isActive ? 'scale-125 opacity-0' : 'scale-100 opacity-30'}`}></div>
                    <div className="absolute inset-2 border-[1px] border-indigo-400/30 rounded-full"></div>
                    
                    <div className={`absolute w-32 h-32 rounded-full transition-all duration-1000 bg-gradient-to-tr from-indigo-900 via-purple-900 to-[#0f0f16] shadow-[inset_0_0_20px_rgba(79,70,229,0.3)] ${isActive ? 'scale-105' : 'scale-100'}`}></div>
                    
                    <span className={`text-5xl font-extralight z-10 transition-colors duration-500 ${isActive ? 'text-white' : 'text-slate-600'}`}>
                      {timeLeft}
                    </span>
                  </div>

                  <button 
                    onClick={() => setIsActive(!isActive)}
                    className={`w-full py-4 rounded-xl font-medium tracking-wide transition-all ${
                      isActive 
                        ? 'bg-white/5 text-slate-300 hover:bg-white/10 border border-white/10' 
                        : 'bg-indigo-600/80 text-white hover:bg-indigo-500 shadow-[0_0_20px_-5px_rgba(79,70,229,0.4)]'
                    }`}
                  >
                    {isActive ? 'Frequenz unterbrechen' : 'In die Frequenz eintreten'}
                  </button>
                </>
              ) : (
                <div className="bg-emerald-900/20 text-emerald-400 p-8 rounded-2xl border border-emerald-500/20 font-light">
                  Diese Realität hat sich bereits manifestiert. Du hast sie durch {sessions} Projektionen ins Leben gerufen.
                </div>
              )}
            </div>
          );
        }

        function ExpectTab({ goal, updateGoal, isCompleted }) {
          const [logText, setLogText] = useState('');
          const [logType, setLogType] = useState('resistance'); 

          const handleAddLog = () => {
            if (!logText.trim()) return;
            
            const newLog = {
              id: Date.now(),
              date: new Date().toISOString(),
              text: logText,
              type: logType
            };

            updateGoal({ expectLogs: [newLog, ...(goal.expectLogs || [])] });
            setLogText('');
          };

          return (
            <div className="flex flex-col h-full">
              <GuideCard type="expect" />
              
              <div className="mb-8 mt-6">
                <p className="text-slate-400 font-light leading-relaxed mb-6">
                  Das Universum organisiert das 'Wie'. Deine Aufgabe ist es, Widerstände aufzulösen und auf die leisen Echos der Synchronizität zu achten.
                </p>

                {!isCompleted && (
                  <div className="bg-white/[0.02] p-1 rounded-xl border border-white/5 flex gap-1 mb-6">
                    <button 
                      onClick={() => setLogType('resistance')}
                      className={`flex-1 py-2.5 text-xs font-medium tracking-wide uppercase rounded-lg transition-all ${
                        logType === 'resistance' 
                          ? 'bg-slate-800 text-purple-400 shadow-md' 
                          : 'text-slate-500 hover:text-slate-300'
                      }`}
                    >
                      Schattenarbeit
                    </button>
                    <button 
                      onClick={() => setLogType('synch')}
                      className={`flex-1 py-2.5 text-xs font-medium tracking-wide uppercase rounded-lg transition-all ${
                        logType === 'synch' 
                          ? 'bg-slate-800 text-amber-400 shadow-md' 
                          : 'text-slate-500 hover:text-slate-300'
                      }`}
                    >
                      Synchronizität
                    </button>
                  </div>
                )}

                {!isCompleted && (
                  <div className="relative">
                    <textarea
                      rows="3"
                      placeholder={logType === 'resistance' ? "Welcher innere Widerstand oder begrenzende Glaubenssatz blockiert dich? Lass ihn hier los..." : "Welches Zeichen oder welche göttliche Fügung ist dir heute begegnet?"}
                      className="w-full px-5 py-4 bg-black/40 border border-white/10 rounded-xl focus:ring-1 focus:ring-purple-500 outline-none transition-all resize-none text-white font-light placeholder:text-slate-600"
                      value={logText}
                      onChange={(e) => setLogText(e.target.value)}
                    />
                    <button 
                      onClick={handleAddLog}
                      disabled={!logText.trim()}
                      className={`w-full mt-3 py-3 rounded-xl font-medium tracking-wide transition-all ${
                        logType === 'resistance'
                          ? 'bg-purple-600/80 hover:bg-purple-500 disabled:bg-purple-900/30 text-white disabled:text-slate-500'
                          : 'bg-amber-600/80 hover:bg-amber-500 disabled:bg-amber-900/30 text-white disabled:text-slate-500'
                      }`}
                    >
                      {logType === 'resistance' ? 'Widerstand dem Feld übergeben' : 'Synchronizität verankern'}
                    </button>
                  </div>
                )}
              </div>

              {/* Log History */}
              <div className="flex-1 mt-4">
                <h4 className="text-[10px] font-medium text-slate-500 uppercase tracking-[0.2em] mb-4 border-b border-white/5 pb-2">Das Buch der Integration</h4>
                {(!goal.expectLogs || goal.expectLogs.length === 0) ? (
                  <p className="text-slate-600 text-sm font-light italic text-center py-8">Der Raum ist leer. Das Feld ist offen.</p>
                ) : (
                  <div className="space-y-4">
                    {goal.expectLogs.map(log => (
                      <div key={log.id} className={`p-5 rounded-xl border backdrop-blur-sm ${
                        log.type === 'resistance' 
                          ? 'bg-purple-900/10 border-purple-500/10' 
                          : 'bg-amber-900/10 border-amber-500/10'
                      }`}>
                        <div className="flex justify-between items-center mb-3">
                          <span className={`text-[10px] font-medium uppercase tracking-widest ${
                            log.type === 'resistance' ? 'text-purple-400' : 'text-amber-400'
                          }`}>
                            {log.type === 'resistance' ? 'Losgelassener Schatten' : 'Erkannte Synchronizität'}
                          </span>
                          <span className="text-[10px] text-slate-500">{new Date(log.date).toLocaleDateString()}</span>
                        </div>
                        <p className="text-slate-300 font-light leading-relaxed">{log.text}</p>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          );
        }

        function CollectTab({ goal, updateGoal, isCompleted }) {
          const [gratitude, setGratitude] = useState(goal.collectionLog || '');

          const handleComplete = () => {
            updateGoal({ 
              status: 'completed',
              collectionLog: gratitude 
            });
          };

          if (isCompleted) {
            return (
              <div className="text-center py-12">
                <div className="w-24 h-24 bg-emerald-900/20 text-emerald-400 rounded-full flex items-center justify-center mx-auto mb-8 border border-emerald-500/30 shadow-[0_0_30px_-5px_rgba(16,185,129,0.3)]">
                  <Sparkles size={40} strokeWidth={1} />
                </div>
                <h3 className="text-3xl font-light text-white mb-3 tracking-wide">Materie geworden.</h3>
                <p className="text-emerald-400/80 font-light mb-12 uppercase tracking-widest text-sm">Die Frequenz ist nun Realität</p>
                
                <div className="bg-white/[0.02] p-8 rounded-2xl border border-white/5 text-left relative overflow-hidden">
                  <div className="absolute top-0 left-0 w-1 h-full bg-emerald-500/50"></div>
                  <p className="text-[10px] font-medium text-emerald-500/70 uppercase tracking-[0.2em] mb-4">Deine Dankbarkeit an das Universum</p>
                  <p className="text-slate-300 font-light italic leading-relaxed text-lg">"{goal.collectionLog}"</p>
                </div>
              </div>
            );
          }

          return (
            <div className="py-4">
              <GuideCard type="collect" />
              
              <div className="text-center mb-10 mt-6">
                <Sparkles size={36} className="text-emerald-400 mx-auto mb-6 opacity-80" strokeWidth={1} />
                <h3 className="text-2xl font-light text-white mb-3">Der Kreis schließt sich</h3>
                <p className="text-slate-400 font-light">
                  Tritt hier nur ein, wenn die materielle Realität deine gesetzte Frequenz eingeholt hat. Fühle tiefe Dankbarkeit für das, was dir zuteil wurde.
                </p>
              </div>
              
              <div className="bg-white/[0.02] p-6 sm:p-8 rounded-2xl border border-white/5">
                <label className="block text-sm font-medium text-emerald-300/80 mb-4">
                  Schließe den Prozess ab. Wofür empfindest du jetzt Dankbarkeit?
                </label>
                <textarea 
                  rows="4"
                  className="w-full px-5 py-4 bg-black/40 border border-white/10 rounded-xl focus:ring-1 focus:ring-emerald-500 outline-none transition-all resize-none mb-6 text-white font-light placeholder:text-slate-600"
                  placeholder="Ich danke dem Universum / meinem höheren Selbst aus tiefstem Herzen für..."
                  value={gratitude}
                  onChange={(e) => setGratitude(e.target.value)}
                ></textarea>

                <button 
                  onClick={handleComplete}
                  disabled={!gratitude.trim()}
                  className="w-full py-4 bg-emerald-600/80 hover:bg-emerald-500 disabled:bg-emerald-900/30 text-white disabled:text-slate-500 rounded-xl font-medium tracking-wide flex items-center justify-center gap-3 transition-all shadow-[0_0_20px_-5px_rgba(16,185,129,0.4)] disabled:shadow-none"
                >
                  <Heart size={18} /> Manifestation als Realität anerkennen
                </button>
              </div>
            </div>
          );
        }

        function GuideCard({ type }) {
          const [isOpen, setIsOpen] = useState(false);

          const guides = {
            select: {
              title: "Führung: Die Kunst des Wählens",
              color: "text-indigo-400",
              bg: "bg-indigo-500/10",
              border: "border-indigo-500/20",
              content: (
                <ul className="space-y-3 text-sm text-slate-300 font-light list-disc pl-4 marker:text-indigo-500 text-left">
                  <li><b>Im Jetzt formulieren:</b> Das Universum kennt keine Zukunft. Schreibe "Ich bin..." oder "Ich habe...", nicht "Ich werde...".</li>
                  <li><b>Fokus auf Fülle:</b> Energie folgt der Aufmerksamkeit. Statt "Keine Schulden mehr", wähle "Finanzielle Freiheit".</li>
                  <li><b>Die Alchemie des Trotzes:</b> Wenn dein Antrieb aus Verletzung, Wut oder Trotz entsteht ("Ich werde es ihnen zeigen!"), nutze diese Energie als Zündfunke, aber wandle sie hier um. Entziehe anderen die Macht und mache es zu <i>deiner</i> Geschichte: "Ich wähle diese Realität für mein eigenes, tiefes Glück."</li>
                </ul>
              )
            },
            project: {
              title: "Führung: Richtiges Projizieren",
              color: "text-indigo-400",
              bg: "bg-indigo-500/10",
              border: "border-indigo-500/20",
              content: (
                <ul className="space-y-3 text-sm text-slate-300 font-light list-disc pl-4 marker:text-indigo-500 text-left">
                  <li><b>Das Geheimnis:</b> Du visualisierst nicht, um etwas zu "bekommen". Du visualisierst, um dich daran zu erinnern, dass diese Realität im Quantenfeld bereits existiert.</li>
                  <li><b>Die Emotion:</b> Das wichtigste Gefühl ist nicht hektische Aufregung, sondern <i>Erleichterung</i> und tiefer Frieden – das Gefühl von "Es ist vollbracht".</li>
                  <li><b>First-Person Perspektive:</b> Sieh dich nicht selbst von außen wie in einem Film, sondern erlebe die Szene durch deine eigenen Augen.</li>
                </ul>
              )
            },
            expect: {
              title: "Führung: Schattenarbeit & Loslassen",
              color: "text-purple-400",
              bg: "bg-purple-500/10",
              border: "border-purple-500/20",
              content: (
                <ul className="space-y-3 text-sm text-slate-300 font-light list-disc pl-4 marker:text-purple-500 text-left">
                  <li><b>Der Expect-Zustand:</b> Das Gegenteil von Warten. Es ist das entspannte Wissen, dass ein bereits bestelltes Paket unterwegs ist. Verbissenheit blockiert die Lieferung.</li>
                  <li><b>Schattenarbeit nutzen:</b> Wenn Ungeduld, Verbissenheit oder das alte "Trotz-Muster" auftaucht, bekämpfe es nicht. Erkenne es an und schreibe es auf. Formel: <i>"Ich spüre gerade [Verbissenheit]. Ich erkenne dieses alte Muster, entziehe ihm die Energie und wähle wieder Vertrauen."</i></li>
                  <li><b>Synchronizitäten:</b> Notiere scheinbare Zufälle. Sie sind Bestätigungen des Feldes, dass sich deine Realität zu dir hin verschiebt.</li>
                </ul>
              )
            },
            collect: {
              title: "Führung: Die Signatur der Materie",
              color: "text-emerald-400",
              bg: "bg-emerald-500/10",
              border: "border-emerald-500/20",
              content: (
                <ul className="space-y-3 text-sm text-slate-300 font-light list-disc pl-4 marker:text-emerald-500 text-left">
                  <li><b>Der richtige Moment:</b> Gehe diesen Schritt erst, wenn sich deine Realität physisch manifestiert hat.</li>
                  <li><b>Warum Dankbarkeit?</b> Dankbarkeit ist der ultimative Empfangszustand. Sie signalisiert deinem Gehirn und dem Feld endgültig: "Das Ereignis hat stattgefunden."</li>
                  <li><b>Vertrauen aufbauen:</b> Indem du deine Manifestationen hier feierst und anerkennst, baust du massives Vertrauen (Glauben) für deine zukünftigen Prozesse auf.</li>
                </ul>
              )
            }
          };

          const activeGuide = guides[type];

          return (
            <div className={`mb-2 rounded-xl border ${activeGuide.border} bg-black/20 overflow-hidden transition-all duration-300`}>
              <button 
                onClick={() => setIsOpen(!isOpen)}
                className={`w-full px-4 py-3 flex items-center justify-between ${activeGuide.bg} hover:bg-white/[0.05] transition-colors focus:outline-none`}
              >
                <div className="flex items-center gap-2">
                  <Info size={16} className={activeGuide.color} />
                  <span className={`text-sm font-medium tracking-wide ${activeGuide.color}`}>{activeGuide.title}</span>
                </div>
                {isOpen ? <ChevronUp size={16} className={activeGuide.color} /> : <ChevronDown size={16} className={activeGuide.color} />}
              </button>
              
              {isOpen && (
                <div className="p-5 border-t border-white/5 animate-fade-in relative z-10">
                  {activeGuide.content}
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
